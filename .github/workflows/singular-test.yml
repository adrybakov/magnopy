name: Test against a single pair of Python version and operating system

on:

  workflow_dispatch:

  workflow_call:

  push:
    branches: [ main, dev ]

  pull_request:
    branches: [ main, dev ]

jobs:

  doc_tests:
    name: Test documentation
    uses: magnopy/magnopy/.github/workflows/doc-tests.yml@main
    with:
      python-version: 3.12
      os: ubuntu-latest

  unit_tests:
    name: Run unit tests
    uses: magnopy/magnopy/.github/workflows/unit-tests.yml@main
    with:
      python-version: 3.12
      os: ubuntu-latest
